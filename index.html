<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Playerdata Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&family=JetBrains+Mono&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- pako for gzip decompression -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <!-- nbt.js for NBT parsing -->
    <script src="https://cdn.jsdelivr.net/npm/nbt@0.8.1/nbt.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Minecraft Playerdata Viewer</h1>
            <div class="upload-container">
                <label for="file-upload" class="custom-file-upload">
                    Upload playerdata (.dat)
                </label>
                <input id="file-upload" type="file" accept=".dat"/>
            </div>
            <div id="file-status">Ready for file...</div>
        </header>

        <main id="main-content" class="hidden">
            <div class="dashboard">
                <!-- Important Details Section -->
                <section class="panel stats-panel">
                    <h2>Important Stats</h2>
                    <div id="stats-grid">
                        <div class="stat-item">
                            <span class="stat-label">Health</span>
                            <span class="stat-value" id="stat-health">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Food Level</span>
                            <span class="stat-value" id="stat-food">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">XP Level</span>
                            <span class="stat-value" id="stat-xp">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Position</span>
                            <span class="stat-value" id="stat-pos">X, Y, Z</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Dimension</span>
                            <span class="stat-value" id="stat-dimension">minecraft:overworld</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Spawn Point</span>
                            <span class="stat-value" id="stat-spawn">X, Y, Z</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Spawn Dimension</span>
                            <span class="stat-value" id="stat-spawndim">minecraft:overworld</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Game Mode</span>
                            <span class="stat-value" id="stat-gamemode">0</span>
                        </div>
                    </div>
                </section>
                
                <!-- Inventory Section -->
                <section class="panel inventory-panel">
                    <h2>Inventory Viewer</h2>
                    <div class="tabs">
                        <button class="tab-btn active" data-tab="tab-inventory">Inventory</button>
                        <button class="tab-btn" data-tab="tab-enderchest">Ender Chest</button>
                        <button class="tab-btn" data-tab="tab-raw">Raw NBT</button>
                    </div>

                    <div id="tab-inventory" class="tab-content active">
                        <div class="mc-gui">
                            <div class="mc-inventory">
                                <!-- Armor & Offhand -->
                                <div class="mc-equipment">
                                    <div class="mc-armor-slots" id="armor-slots">
                                        <!-- 4 slots for helmet, chestplate, leggings, boots -->
                                    </div>
                                    <div class="mc-offhand-slot" id="offhand-slot">
                                        <!-- 1 offhand slot -->
                                    </div>
                                </div>
                                
                                <!-- Main Inventory (3 rows x 9 columns) -->
                                <p class="inventory-label">Inventory</p>
                                <div class="mc-main-slots" id="main-inventory-slots">
                                    <!-- 27 slots added via JS -->
                                </div>
                                <div class="mc-hotbar-slots" id="hotbar-slots">
                                    <!-- 9 slots added via JS -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="tab-enderchest" class="tab-content">
                        <div class="mc-gui">
                            <div class="mc-inventory">
                                <p class="inventory-label">Ender Chest</p>
                                <div class="mc-main-slots" id="enderchest-slots">
                                    <!-- 27 slots added via JS -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="tab-raw" class="tab-content">
                        <div class="raw-nbt-container">
                            <pre id="raw-nbt-output">Upload a file to view raw NBT.</pre>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Tooltip Element -->
    <div id="item-tooltip" class="mc-tooltip hidden">
        <div class="tooltip-title" id="tt-name">Item Name</div>
        <div class="tooltip-body" id="tt-body"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
